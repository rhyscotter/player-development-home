<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Player Development</title>

<style>
:root{
  --accent:#7B2EFF;
  --accent2:#B266FF;
  --clubGlow: rgba(123,46,255,.18);
}

*{box-sizing:border-box}

body{
  margin:0;
  background:#000;
  color:#fff;
  font-family:Arial,sans-serif
}

.stage{
  min-height:100vh;
  padding:22px;
  background:
    radial-gradient(1000px 600px at 20% -10%, rgba(255,255,255,.05), transparent 60%),
    radial-gradient(900px 650px at 95% 10%, var(--clubGlow), transparent 55%),
    linear-gradient(180deg,#000 0%,#050505 100%);
}

.wrap{max-width:980px;margin:0 auto}

.teamName{
  font-family:Impact,Haettenschweiler,'Arial Narrow Bold',sans-serif;
  font-size:48px;
  text-transform:uppercase;
  letter-spacing:1px;
}

.titleLine{
  height:4px;
  width:100%;
  max-width:420px;
  border-radius:999px;
  margin-top:6px;
  background:linear-gradient(90deg,var(--accent),transparent);
}

.sub{
  margin-top:10px;
  color:rgba(255,255,255,.75);
  font-size:14px;
}

.grid{
  margin-top:24px;
  display:grid;
  grid-template-columns:1.2fr .8fr;
  gap:14px;
}

@media (max-width:880px){
  .grid{grid-template-columns:1fr}
}

.card{
  background:rgba(17,17,17,.85);
  border:1px solid rgba(255,255,255,.10);
  border-radius:16px;
  padding:16px;
}

.sectionTitle{
  font-family:Impact,Haettenschweiler,'Arial Narrow Bold',sans-serif;
  font-size:26px;
  text-transform:uppercase;
  letter-spacing:.6px;
  position:relative;
  padding-bottom:6px;
}

.sectionTitle::after{
  content:"";
  position:absolute;
  left:0;
  bottom:0;
  height:4px;
  width:100%;
  border-radius:999px;
  background:linear-gradient(90deg,var(--accent),transparent);
}

.smallSub{
  margin-top:8px;
  color:rgba(255,255,255,.7);
  font-size:13px;
}

/* buttons */
.btnStack{margin-top:14px;display:flex;flex-direction:column;gap:12px}

.bigBtn{
  display:flex;justify-content:space-between;align-items:center;
  padding:16px;border-radius:16px;
  border:1px solid rgba(255,255,255,.12);
  background:rgba(255,255,255,.04);
  cursor:pointer;transition:.18s;
}
.bigBtn:hover{border-color:var(--accent);box-shadow:0 0 18px var(--clubGlow)}

/* ✅ titles forced white */
.btnTitle{
  font-family:Impact,sans-serif;
  text-transform:uppercase;
  font-size:22px;
  color:#fff;
}
.btnSub{font-size:13px;color:rgba(255,255,255,.7)}
.chev{font-family:Impact,sans-serif;font-size:26px}

.search{
  width:100%;
  padding:12px;border-radius:12px;
  border:1px solid rgba(255,255,255,.12);
  background:rgba(255,255,255,.04);
  color:#fff;margin-top:10px;
}

.results{margin-top:10px}
.resultItem{
  padding:10px;border-radius:12px;
  border:1px solid rgba(255,255,255,.08);
  background:rgba(255,255,255,.03);
  margin-bottom:6px;cursor:pointer;
}
.rName{font-family:Impact;text-transform:uppercase}

.updates{margin-top:14px;border-top:1px solid rgba(255,255,255,.08);padding-top:10px}
.updateItem{
  padding:10px;border-radius:12px;
  border:1px solid rgba(255,255,255,.08);
  background:rgba(255,255,255,.03);
  margin-bottom:6px;
}

/* tiny debug pill (visible on Wix if theme fails) */
.debug{
  margin-top:10px;
  font-size:12px;
  color:rgba(255,255,255,.75);
  border:1px solid rgba(255,255,255,.10);
  background:rgba(255,255,255,.03);
  padding:10px 12px;
  border-radius:12px;
  display:none;
}
.debug.on{display:block}
.debug b{color:#fff}
</style>
</head>

<body>
<div class="stage">
  <div class="wrap">

    <div class="teamName" id="pageTitle">Player Development</div>
    <div class="titleLine"></div>
    <div class="sub" id="coachName">Coach</div>

    <div class="debug" id="debugBox"></div>

    <div class="grid">
      <div class="card">
        <h2 class="sectionTitle">Quick Access</h2>
        <div class="smallSub">Select a development tool.</div>

        <div class="btnStack">
          <button class="bigBtn" id="btnEval" type="button">
            <div>
              <div class="btnTitle">Player Evaluation</div>
              <div class="btnSub">Ratings • notes • match feedback</div>
            </div>
            <div class="chev">›</div>
          </button>

          <button class="bigBtn" id="btnIdp" type="button">
            <div>
              <div class="btnTitle">Individual Development Plan</div>
              <div class="btnSub">Goals • progress • training focus</div>
            </div>
            <div class="chev">›</div>
          </button>
        </div>
      </div>

      <div class="card">
        <h2 class="sectionTitle">Overview</h2>

        <input id="playerSearch" class="search" placeholder="Search player name" />
        <div class="results" id="results"></div>

        <div class="updates">
          <div style="font-weight:bold;font-size:12px;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,.7)">Recent Updates</div>
          <div id="updateList"></div>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
/* ---------- helpers ---------- */
function clean(v){ return String(v || "").trim(); }
function lower(v){ return String(v || "").toLowerCase().trim(); }
function safe(s){ return String(s ?? "").replace(/[<>]/g,""); }

function readCssVar(name){
  return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
}

function showDebug(obj){
  const box = document.getElementById("debugBox");
  box.classList.add("on");
  box.innerHTML = `
    <div><b>Theme Debug</b></div>
    <div>source: <b>${safe(obj.source || "unknown")}</b></div>
    <div>clubSlug: <b>${safe(obj.clubSlug || "")}</b></div>
    <div>accent: <b>${safe(readCssVar("--accent"))}</b></div>
    <div>accent2: <b>${safe(readCssVar("--accent2"))}</b></div>
    <div>glow: <b>${safe(readCssVar("--clubGlow"))}</b></div>
    <div style="margin-top:6px;opacity:.85">url: ${safe(location.href)}</div>
  `;
}

/* ---------- club theme fallbacks (add all your club slugs here) ---------- */
const CLUB_THEMES = {
  default:     { accent:"#7B2EFF", accent2:"#B266FF", glow:"rgba(123,46,255,.18)" },

  cherrybrook: { accent:"#C8102E", accent2:"#FF4B5C", glow:"rgba(200,16,46,.20)" },
  monmouth:    { accent:"#00E5FF", accent2:"#00A3FF", glow:"rgba(0,229,255,.18)" },
  rumson:      { accent:"#FFFFFF", accent2:"#BDBDBD", glow:"rgba(255,255,255,.10)" },
  mds:         { accent:"#7B2EFF", accent2:"#B266FF", glow:"rgba(123,46,255,.18)" }
};

/* ---------- apply theme ---------- */
function applyTheme({ clubSlug, theme, source }){
  const slug = lower(clubSlug || "default");
  const fb = CLUB_THEMES[slug] || CLUB_THEMES.default;

  const rawAccent  = theme?.accent  ?? theme?.primary   ?? "";
  const rawAccent2 = theme?.accent2 ?? theme?.secondary ?? "";
  const rawGlow    = theme?.glow    ?? theme?.clubGlow  ?? theme?.bgGlow ?? "";

  const accent  = clean(rawAccent)  || fb.accent;
  const accent2 = clean(rawAccent2) || fb.accent2 || accent;
  const glow    = clean(rawGlow)    || fb.glow;

  const r = document.documentElement.style;
  r.setProperty("--accent", accent);
  r.setProperty("--accent2", accent2);
  r.setProperty("--clubGlow", glow);

  console.log("🎨 THEME APPLIED:", { slug, accent, accent2, glow, source });

  // show debug if it looks like we stayed at default (helps you diagnose instantly)
  showDebug({ source, clubSlug: slug });

  try { window.parent.postMessage({ type:"PLAYER_DEV_THEME_APPLIED", slug, accent, accent2, glow }, "*"); } catch(_) {}
}

/* ---------- parse HASH theming (best for Wix) ----------
   We support:
   #clubSlug=cherrybrook&accent=%23C8102E&accent2=%23FF4B5C&glow=rgba(...)
*/
function parseHashParams(){
  const raw = String(location.hash || "").replace(/^#/, "");
  if (!raw) return null;
  const p = new URLSearchParams(raw);
  const clubSlug = p.get("clubSlug") || p.get("club") || "";
  const accent = p.get("accent") || p.get("primary") || "";
  const accent2 = p.get("accent2") || p.get("secondary") || "";
  const glow = p.get("glow") || p.get("clubGlow") || p.get("bgGlow") || "";
  const coachName = p.get("coachName") || p.get("coach") || "";
  return { clubSlug, theme:{ accent, accent2, glow }, coachName };
}

/* ---------- data ---------- */
let PLAYERS = [];
let UPDATES = [];

function renderPlayers(list){
  const results = document.getElementById("results");
  results.innerHTML = "";
  const items = Array.isArray(list) ? list : [];
  if (!items.length){
    results.innerHTML = `<div style="padding:10px;border-radius:12px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.03);color:rgba(255,255,255,.7);font-size:13px">No players</div>`;
    return;
  }
  items.slice(0,6).forEach(p => {
    const div = document.createElement("div");
    div.className = "resultItem";
    div.innerHTML = `
      <div class="rName">${safe(p?.name || "Player")}</div>
      <div style="font-size:12px;color:rgba(255,255,255,.6)">${safe(p?.team || "")}</div>
    `;
    div.onclick = () => {
      try { window.parent.postMessage({ type:"PLAYER_DEV_OPEN_PLAYER", playerId: p?.id || p?._id || null }, "*"); } catch(_) {}
    };
    results.appendChild(div);
  });
}

function renderUpdates(list){
  const el = document.getElementById("updateList");
  el.innerHTML = "";
  const items = Array.isArray(list) ? list : [];
  if (!items.length){
    el.innerHTML = `<div style="padding:10px;border-radius:12px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.03);color:rgba(255,255,255,.7);font-size:13px">No updates</div>`;
    return;
  }
  items.slice(0,3).forEach(u => {
    const div = document.createElement("div");
    div.className = "updateItem";
    div.innerHTML = `
      <div style="font-family:Impact;text-transform:uppercase">${safe(u?.title || "Update")}</div>
      <div style="font-size:12px;color:rgba(255,255,255,.7)">${safe(u?.sub || "")}</div>
    `;
    el.appendChild(div);
  });
}

/* search */
document.getElementById("playerSearch").addEventListener("input", (e) => {
  const q = lower(e.target.value);
  if (!q) return renderPlayers(PLAYERS);
  renderPlayers(PLAYERS.filter(p => lower(p?.name).includes(q)));
});

/* buttons */
document.getElementById("btnEval").onclick = () => { try { window.parent.postMessage({ type:"PLAYER_DEV_NAV", action:"evaluation" }, "*"); } catch(_) {} };
document.getElementById("btnIdp").onclick  = () => { try { window.parent.postMessage({ type:"PLAYER_DEV_NAV", action:"idp" }, "*"); } catch(_) {} };

/* ---------- INIT 1: hash params (Wix-safe) ---------- */
(function initFromHash(){
  const h = parseHashParams();
  if (!h) {
    applyTheme({ clubSlug:"default", theme:{}, source:"default" });
    return;
  }
  if (h.coachName) document.getElementById("coachName").textContent = safe(h.coachName);
  applyTheme({ clubSlug:h.clubSlug, theme:h.theme, source:"hash" });
})();

/* ---------- INIT 2: postMessage (Wix HTML component workflow) ---------- */
window.addEventListener("message", (ev) => {
  const msg = ev.data;
  if (!msg) return;

  if (msg.type === "PLAYER_DEV_INIT"){
    if (msg.coachName) document.getElementById("coachName").textContent = safe(msg.coachName);
    applyTheme({ clubSlug: msg.clubSlug, theme: msg.theme || {}, source:"postMessage" });

    PLAYERS = Array.isArray(msg.players) ? msg.players : [];
    UPDATES = Array.isArray(msg.updates) ? msg.updates : [];
    renderPlayers(PLAYERS);
    renderUpdates(UPDATES);
  }

  if (msg.type === "PLAYER_DEV_SET_THEME"){
    applyTheme({ clubSlug: msg.clubSlug, theme: msg.theme || {}, source:"postMessage" });
  }
});

/* handshake */
try { window.parent.postMessage({ type:"PLAYER_DEV_IFRAME_READY" }, "*"); } catch(_) {}
</script>
</body>
</html>
