<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Player Development</title>

<style>

:root{
  --accent:#7B2EFF;
  --accent2:#B266FF;
  --clubGlow: rgba(123,46,255,.18);
}

*{box-sizing:border-box}

body{
  margin:0;
  background:#000;
  color:#fff;
  font-family:Arial,sans-serif
}

.stage{
  min-height:100vh;
  padding:22px;
  background:
  radial-gradient(1000px 600px at 20% -10%, rgba(255,255,255,.05), transparent 60%),
  radial-gradient(900px 650px at 95% 10%, var(--clubGlow), transparent 55%),
  linear-gradient(180deg,#000 0%,#050505 100%);
}

.wrap{
  max-width:980px;
  margin:0 auto;
}

.teamName{
  font-family:Impact,Haettenschweiler,'Arial Narrow Bold',sans-serif;
  font-size:48px;
  text-transform:uppercase;
  letter-spacing:1px;
}

.titleLine{
  height:4px;
  width:100%;
  max-width:420px;
  border-radius:999px;
  margin-top:6px;
  background:linear-gradient(90deg,var(--accent),transparent);
}

.sub{
  margin-top:10px;
  color:rgba(255,255,255,.75);
  font-size:14px;
}

.grid{
  margin-top:24px;
  display:grid;
  grid-template-columns:1.2fr .8fr;
  gap:14px;
}

@media (max-width:880px){
  .grid{grid-template-columns:1fr}
}

.card{
  background:rgba(17,17,17,.85);
  border:1px solid rgba(255,255,255,.10);
  border-radius:16px;
  padding:16px;
}

.sectionTitle{
  font-family:Impact,Haettenschweiler,'Arial Narrow Bold',sans-serif;
  font-size:26px;
  text-transform:uppercase;
  letter-spacing:.6px;
  position:relative;
  padding-bottom:6px;
}

.sectionTitle::after{
  content:"";
  position:absolute;
  left:0;
  bottom:0;
  height:4px;
  width:100%;
  border-radius:999px;
  background:linear-gradient(90deg,var(--accent),transparent);
}

.smallSub{
  margin-top:8px;
  color:rgba(255,255,255,.7);
  font-size:13px;
}

/* BUTTON STACK */

.btnStack{
  margin-top:14px;
  display:flex;
  flex-direction:column;
  gap:12px
}

.bigBtn{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:16px;
  border-radius:16px;
  border:1px solid rgba(255,255,255,.12);
  background:rgba(255,255,255,.04);
  cursor:pointer;
  transition:.18s;
}

.bigBtn:hover{
  border-color:var(--accent);
  box-shadow:0 0 18px var(--clubGlow);
}

/* FORCE BUTTON TITLES WHITE */

.btnTitle{
  font-family:Impact,sans-serif;
  text-transform:uppercase;
  font-size:22px;
  color:#fff;
}

.btnSub{
  font-size:13px;
  color:rgba(255,255,255,.7);
}

.chev{
  font-family:Impact,sans-serif;
  font-size:26px;
}

.search{
  width:100%;
  padding:12px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,.12);
  background:rgba(255,255,255,.04);
  color:#fff;
  margin-top:10px;
}

.results{
  margin-top:10px;
}

.resultItem{
  padding:10px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,.08);
  background:rgba(255,255,255,.03);
  margin-bottom:6px;
}

.rName{
  font-family:Impact;
  text-transform:uppercase;
}

.updates{
  margin-top:14px;
  border-top:1px solid rgba(255,255,255,.08);
  padding-top:10px;
}

.updateItem{
  padding:10px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,.08);
  background:rgba(255,255,255,.03);
  margin-bottom:6px;
}

</style>
</head>

<body>

<div class="stage">
<div class="wrap">

<div class="teamName" id="pageTitle">Player Development</div>
<div class="titleLine"></div>
<div class="sub" id="coachName">Loading coach…</div>

<div class="grid">

<div class="card">

<h2 class="sectionTitle">Quick Access</h2>
<div class="smallSub">Select a development tool.</div>

<div class="btnStack">

<button class="bigBtn" id="btnEval">
<div>
<div class="btnTitle">Player Evaluation</div>
<div class="btnSub">Ratings • notes • match feedback</div>
</div>
<div class="chev">›</div>
</button>

<button class="bigBtn" id="btnIdp">
<div>
<div class="btnTitle">Individual Development Plan</div>
<div class="btnSub">Goals • progress • training focus</div>
</div>
<div class="chev">›</div>
</button>

</div>

</div>

<div class="card">

<h2 class="sectionTitle">Overview</h2>

<input id="playerSearch" class="search" placeholder="Search player name"/>

<div class="results" id="results"></div>

<div class="updates">
<div style="font-weight:bold;font-size:12px;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,.7)">Recent Updates</div>
<div id="updateList"></div>
</div>

</div>

</div>

</div>
</div>

<script>

/* THEMING */

const CLUB_THEMES = {
default:{accent:"#7B2EFF",accent2:"#B266FF",bgGlow:"rgba(123,46,255,.18)"},
cherrybrook:{accent:"#C8102E",accent2:"#FF4B5C",bgGlow:"rgba(200,16,46,.20)"}
}

function applyTheme(payload){

const slug=(payload?.clubSlug||"default").toLowerCase()

const fallback=CLUB_THEMES[slug]||CLUB_THEMES.default

const accent=payload?.theme?.accent||fallback.accent
const accent2=payload?.theme?.accent2||fallback.accent2
const glow=payload?.theme?.glow||fallback.bgGlow

const r=document.documentElement.style

r.setProperty("--accent",accent)
r.setProperty("--accent2",accent2)
r.setProperty("--clubGlow",glow)

}

/* DATA */

let PLAYERS=[]
let UPDATES=[]

function renderPlayers(list){

const results=document.getElementById("results")
results.innerHTML=""

list.slice(0,6).forEach(p=>{

const div=document.createElement("div")

div.className="resultItem"

div.innerHTML=`
<div class="rName">${p.name}</div>
<div style="font-size:12px;color:rgba(255,255,255,.6)">${p.team||""}</div>
`

results.appendChild(div)

})

}

function renderUpdates(list){

const el=document.getElementById("updateList")
el.innerHTML=""

list.slice(0,3).forEach(u=>{

const div=document.createElement("div")

div.className="updateItem"

div.innerHTML=`
<div style="font-family:Impact;text-transform:uppercase">${u.title}</div>
<div style="font-size:12px;color:rgba(255,255,255,.7)">${u.sub||""}</div>
`

el.appendChild(div)

})

}

/* SEARCH */

document.getElementById("playerSearch").addEventListener("input",e=>{

const q=e.target.value.toLowerCase()

renderPlayers(PLAYERS.filter(p=>p.name.toLowerCase().includes(q)))

})

/* BUTTON EVENTS */

document.getElementById("btnEval").onclick=()=>{

window.parent.postMessage({type:"PLAYER_DEV_NAV",action:"evaluation"},"*")

}

document.getElementById("btnIdp").onclick=()=>{

window.parent.postMessage({type:"PLAYER_DEV_NAV",action:"idp"},"*")

}

/* MESSAGE HANDLER */

window.addEventListener("message",(ev)=>{

const data=ev.data

if(!data)return

if(data.type==="PLAYER_DEV_INIT"){

applyTheme(data)

document.getElementById("coachName").textContent=data.coachName||"Coach"

PLAYERS=data.players||[]
UPDATES=data.updates||[]

renderPlayers(PLAYERS)
renderUpdates(UPDATES)

}

})

try{
window.parent.postMessage({type:"PLAYER_DEV_IFRAME_READY"},"*")
}catch{}

</script>

</body>
</html>
